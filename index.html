<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用成语150句</title>
    <!-- 引入外部样式文件 style.css -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入 Tailwind CSS 样式库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入中文字体 Noto Serif SC 及英文字体 Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen p-4 pb-12 flex flex-col items-center justify-start select-none bg-stone-50">

    <!-- 网页核心容器 -->
    <div id="app" class="w-full max-w-md pt-6 flex flex-col">
        <!-- 头部标题区 -->
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-stone-700 tracking-wide">常用成语150句</h1>
            <!-- 每日复习计划进度动态显示 -->
            <p id="daily-status" class="text-xs text-stone-400 mt-2 font-medium tracking-wider uppercase">正在初始化今日计划...</p>
        </header>

        <!-- 错题专项训练入口 -->
        <button onclick="startWeaknessTraining()" class="mb-6 w-full py-3 border border-stone-300 rounded-xl text-stone-600 font-medium bg-white hover:bg-stone-100 transition-all text-sm tracking-wider shadow-sm">
            🎯 开启错题专项训练
        </button>

        <!-- 主面板：卡片浏览模式 -->
        <div id="flashcard-panel" class="block">
            <!-- 闪卡容器（点击卡片非按钮区域可实现翻转） -->
            <div id="card-container" class="perspective-container relative h-96 mb-6 cursor-pointer">
                <div id="flip-card" class="card-inner relative w-full h-full">
                    
                    <!-- 卡片正面：成语 + 拼音 -->
                    <div class="absolute inset-0 bg-white rounded-2xl border border-stone-200/80 shadow-soft flex flex-col items-center justify-center p-8 backface-hidden">
                        <div id="card-idiom-ruby" class="text-4xl sm:text-5xl text-stone-800 flex justify-center items-center gap-2">
                            <!-- 由 JavaScript 动态生成带拼音的汉字 -->
                        </div>
                    </div>
                    
                    <!-- 卡片反面：释义 + 英文 + 例句 -->
                    <div class="absolute inset-0 bg-white rounded-2xl border border-stone-200/80 shadow-soft flex flex-col p-6 rotate-y-180 backface-hidden justify-between overflow-y-auto">
                        <!-- 顶端状态栏 -->
                        <div class="flex justify-between items-center pb-3 border-b border-stone-100/80 mb-2">
                            <span class="text-[10px] font-bold text-stone-400 tracking-widest uppercase">DETAIL / 详情</span>
                            <span class="text-[10px] font-medium text-amber-800 bg-amber-50/80 px-2 py-0.5 rounded-full tracking-wider">精读复习卡</span>
                        </div>

                        <!-- 核心信息分层显示区 -->
                        <div class="flex-grow flex flex-col justify-center space-y-4 my-auto">
                            <!-- 中文释义 -->
                            <div class="relative pl-3 border-l-2 border-stone-700/60">
                                <span class="text-[10px] font-bold text-amber-800/80 tracking-wider block mb-1">【释义】</span>
                                <p id="card-def-zh" class="text-stone-800 text-sm leading-relaxed font-semibold tracking-wide"></p>
                            </div>

                            <!-- 英文解释 -->
                            <div class="relative pl-3 border-l-2 border-stone-300">
                                <span class="text-[10px] font-bold text-stone-400 tracking-wider block mb-1">【TRANSLATION】</span>
                                <p id="card-def-en" class="text-stone-500 text-xs italic leading-relaxed font-medium"></p>
                            </div>
                        </div>

                        <!-- 真实场景例句区 -->
                        <div class="bg-stone-50/80 p-4 rounded-xl border border-stone-100/70 mt-4 relative overflow-hidden">
                            <div class="absolute right-2 bottom-0 text-stone-200/50 text-5xl font-serif select-none pointer-events-none">”</div>
                            <div class="flex items-center gap-1.5 mb-1.5">
                                <svg class="w-3.5 h-3.5 text-stone-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                                </svg>
                                <span class="text-[10px] font-bold text-stone-400 tracking-widest uppercase">例句 / Context</span>
                            </div>
                            <p id="card-example" class="text-stone-600 text-xs leading-relaxed font-medium relative z-10 pl-1"></p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 控制区：掌握/待加强 按钮 -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="markMastery(false)" class="py-4 bg-white border border-stone-200 hover:border-stone-300 hover:bg-stone-50 active:bg-stone-100 rounded-xl text-stone-500 transition-all text-sm font-semibold tracking-wider flex items-center justify-center gap-1.5 shadow-xs">
                    ❌ 待加强
                </button>
                <button onclick="markMastery(true)" class="py-4 bg-stone-700 hover:bg-stone-800 active:bg-stone-900 text-white rounded-xl transition-all text-sm font-semibold tracking-wider flex items-center justify-center gap-1.5 shadow-sm">
                    ✅ 已掌握
                </button>
            </div>

            <!-- 底部进度提示 -->
            <div id="progress-indicator" class="text-center text-xs text-stone-400 font-medium"></div>
        </div>
    </div>

    <!-- 引入外部数据与逻辑脚本 -->
    <script src="data.js"></script>
    <script src="script.js"></script>

</body>
</html>
